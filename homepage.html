<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy UI cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css link -->
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm px-10 flex flex-col md:flex md:flex-row gap-5 md:justify-between">
            <!-- left part -->
            <div class="flex justify-center items-center">
                <img class="w-10" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <!-- right part -->
            <div class="flex gap-4">
                <input id="input-search" type="text" placeholder="Search issues..."
                    class="input input-bordered w-24 md:w-auto" />
                <div>
                    <button id="search-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="w-11/12 mx-auto mt-8">
            <!-- toggle button -->
            <div class="p-4 bg-white shadow-sm border-t-2 rounded-t-md border-t-gray-400/20">
                <button class="showBtn btn btn-primary btn-sm px-8">All</button>
                <button class="showBtn btn btn-sm px-6">Open</button>
                <button class="showBtn btn btn-sm px-6">Closed</button>
            </div>
            <div class="bg-base-200 shadow-md">
                <div
                    class=" mt-4 p-5 justify-between items-center shadow-sm bg-white flex flex-col md:flex md:flex-row gap-3">
                    <div class="flex justify-between items-center gap-3">
                        <div class="w-12 h-12 rounded-full flex justify-center items-center bg-[#ECE4FF]">
                            <img class="w-8 h-8" src="./assets/Aperture.png" alt="">
                        </div>
                        <div class="">
                            <h1 class="text-[#64748B] text-xl font-semibold"><span id="cardCount">0</span> Issues</h1>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center gap-2">
                        <p class="text-[#64748B]">
                        <div class="w-4 h-4 bg-[#00A96E] rounded-full"></div>Open</p>
                        <p class="text-[#64748B]">
                        <div class="w-4 h-4 bg-[#A855F7] rounded-full"></div>Closed</p>
                    </div>
                </div>
                <!-- spinner -->
                <div id="loadSpinner" class="flex  justify-center items-center p-6 hidden">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
                <!-- modal container -->
                <dialog id="my_modal_1" class="modal">

                </dialog>
                <!-- all card container -->
                <div id="cardContainer" class="mt-4 grid md:grid-cols-4 grid-cols-1 gap-3 p-3">
                </div>
                <!-- open card container -->
                <div id="Open-card-container" class="mt-4 grid md:grid-cols-4 grid-cols-1 gap-3 p-3 hidden">

                </div>
                <!-- closed car container -->
                <div id="closed-card-container" class="mt-4 grid md:grid-cols-4 grid-cols-1 gap-3 p-3 w-full hidden">

                </div>
            </div>
        </section>
    </main>
    <script src="./js/homepage.js"></script>
</body>

</html>
